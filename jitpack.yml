jdk:
  - openjdk21

install:
  - sdk install java 21.0.2-open
  - sdk use java 21.0.2-open
  - sdk install maven 3.9.6
  - sdk use maven 3.9.6
  - |
    TAG_VERSION="${VERSION:-v1.3.8}"
    PROJECT_VERSION="${TAG_VERSION#v}"
    echo "🔧 Building dough version: $PROJECT_VERSION"
    mvn clean install -Drevision="$PROJECT_VERSION" -DskipTests --no-transfer-progress -B